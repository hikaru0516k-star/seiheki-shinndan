<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>性癖タイプ診断｜あなたの隠れたタイプがわかる無料診断</title>

  <meta
    name="description"
    content="簡単な質問に答えるだけで、あなたの性癖タイプ・相性タイプ・隠れた傾向がわかる無料診断サイトです。"
  />

  <meta property="og:title" content="性癖タイプ診断" />
  <meta
    property="og:description"
    content="あなたの隠れたタイプや相性タイプを無料で診断できます。"
  />
  <meta property="og:type" content="website" />

  <meta property="og:url" content="https://seiheki-shindan.vercel.app/" />

  <link rel="canonical" href="https://seiheki-shindan.vercel.app/" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background: linear-gradient(135deg, #170018, #320033, #120014);
      color: white;
    }

    .container {
      max-width: 850px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 38px;
      margin-bottom: 10px;
    }

    .description {
      text-align: center;
      color: #f3cfff;
      line-height: 1.7;
      margin-bottom: 35px;
    }

    .question {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 22px;
      backdrop-filter: blur(6px);
    }

    .question h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    .buttons {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .answer-btn {
      background: white;
      color: #320033;
      font-weight: bold;
    }

    .answer-btn:hover {
      background: #ffdfff;
      transform: translateY(-2px);
    }

    .result-btn {
      width: 100%;
      background: #ff4fd8;
      color: white;
      font-weight: bold;
      margin-top: 25px;
      font-size: 17px;
    }

    .result-btn:hover {
      opacity: 0.9;
    }

    .result {
      background: rgba(255,255,255,0.1);
      border-radius: 25px;
      padding: 30px;
      margin-top: 35px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .result h2 {
      color: #ffd4ff;
      font-size: 32px;
      margin-bottom: 15px;
    }

    .percent {
      font-size: 58px;
      font-weight: bold;
      margin: 20px 0;
      color: #ff4fd8;
    }

    .share {
      display: inline-block;
      margin-top: 20px;
      background: black;
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
    }

    .retry {
      margin-top: 15px;
      background: white;
      color: #320033;
      width: 100%;
    }

    .seo {
      margin-top: 55px;
      line-height: 1.8;
      color: #f4d4ff;
    }

    .seo h2 {
      color: white;
    }

    @media (max-width: 600px) {

      h1 {
        font-size: 30px;
      }

      .question {
        padding: 18px;
      }

      .result h2 {
        font-size: 25px;
      }

      .percent {
        font-size: 48px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>性癖タイプ診断</h1>

  <p class="description">
    10個の質問に答えるだけで、あなたの隠れたタイプ・相性タイプ・傾向がわかります。
  </p>

  <div id="questions"></div>

  <button class="result-btn" onclick="showResult()">
    診断する
  </button>

  <div id="result"></div>

  <div class="seo">
    <h2>性癖タイプ診断とは？</h2>

    <p>
      性癖タイプ診断は、あなたの恋愛傾向・刺激を感じやすいポイント・相性の良いタイプを簡単にチェックできる無料診断です。
      S気質、M気質、言葉責め、甘えたい傾向、安心感重視など、さまざまなタイプから結果を表示します。
    </p>
  </div>

</div>

<script>

const questions = [
  "相手にリードされるより、自分が主導権を握りたい？",
  "強めの言葉で責める・責められる関係に惹かれる？",
  "甘やかされるより、少し意地悪される方がドキッとする？",
  "相手の反応を見るのが好き？",
  "恥ずかしさや背徳感のあるシチュエーションに弱い？",
  "言葉で褒められると弱い？",
  "尽くされたいと思う？",
  "少し支配的な雰囲気に安心感を感じる？",
  "普段とのギャップがある人に惹かれやすい？",
  "刺激より安心感を重視する？"
];

const results = [
  {
    name: "支配欲強めのリードタイプ",
    desc: "相手を引っ張ることに魅力を感じやすいタイプ。頼られるほど燃えやすい傾向があります。",
    match: "甘えん坊タイプ"
  },
  {
    name: "いじられ快感の受け身タイプ",
    desc: "少し強めにリードされることでドキドキしやすいタイプ。",
    match: "包容力のあるタイプ"
  },
  {
    name: "言葉責めに弱い妄想タイプ",
    desc: "雰囲気や言葉による刺激に弱いタイプ。",
    match: "会話上手タイプ"
  },
  {
    name: "安心感重視のやさしめタイプ",
    desc: "刺激よりも安心感や信頼感を大切にするタイプ。",
    match: "誠実タイプ"
  }
];

const answers = [];

const questionsDiv = document.getElementById("questions");

questions.forEach((q, index) => {

  const div = document.createElement("div");

  div.className = "question";

  div.innerHTML = `
    <h2>Q${index + 1}. ${q}</h2>

    <div class="buttons">
      <button class="answer-btn" onclick="answer(${index}, 3)">とても当てはまる</button>

      <button class="answer-btn" onclick="answer(${index}, 2)">少し当てはまる</button>

      <button class="answer-btn" onclick="answer(${index}, 1)">あまり当てはまらない</button>

      <button class="answer-btn" onclick="answer(${index}, 0)">当てはまらない</button>
    </div>
  `;

  questionsDiv.appendChild(div);

});

function answer(index, score) {

  answers[index] = score;

}

function showResult() {

  if (answers.length < questions.length) {

    alert("すべての質問に答えてください");

    return;
  }

  const total = answers.reduce((a, b) => a + b, 0);

  let result;

  if (total >= 24) {

    result = results[0];

  } else if (total >= 18) {

    result = results[1];

  } else if (total >= 12) {

    result = results[2];

  } else {

    result = results[3];
  }

  const percent = Math.min(
    99,
    Math.floor((total / 30) * 100)
  );

  document.getElementById("result").innerHTML = `

    <div class="result">

      <p>あなたの診断結果</p>

      <h2>${result.name}</h2>

      <div class="percent">${percent}%</div>

      <p>${result.desc}</p>

      <h3>相性が良いタイプ</h3>

      <p>${result.match}</p>

      <a
        class="share"
        target="_blank"
        href="https://twitter.com/intent/tweet?text=${encodeURIComponent(
          "私の診断結果は「" + result.name + "」でした！"
        )}&url=${encodeURIComponent(
          "https://seiheki-shindan.vercel.app/"
        )}"
      >
        Xで共有する
      </a>

      <button class="retry" onclick="location.reload()">
        もう一度診断する
      </button>

    </div>
  `;
}

</script>

</body>
</html>
