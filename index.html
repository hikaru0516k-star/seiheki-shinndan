    const scores = {

      deepM: 0,
      softS: 0,

      word: 0,
      tsundere: 0,
      amae: 0,
      dominant: 0,
      secret: 0,
      romance: 0,
    };

    const app = document.getElementById("app");

    function showAgeGate() {
      app.innerHTML = `
        <h1>性癖タイプ診断</h1>

        <button onclick="startQuiz()">
          18歳以上なので診断する
        </button>
      `;
    }

    function startQuiz() {
      current = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = questions[current];

      app.innerHTML = `
        <div class="progress">
          ${current + 1} / ${questions.length}
        </div>

        <h1>性癖タイプ診断</h1>

        <div class="answers">
          ${q.answers
            .map(
              (a) =>
                `<button onclick="answer('${a[1]}')">${a[0]}</button>`
            )
            .join("")}
        </div>
      `;
    }

    function answer(type) {
      scores[type]++;
      current++;

      if (current >= questions.length) {
        showResult();
      } else {
        showQuestion();
      }
    }

    function showResult() {
      const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];

      const result = results[top];

      const shareText = encodeURIComponent(
        `私の性癖タイプは「${result.name}」でした！`
      );

      app.innerHTML = `
